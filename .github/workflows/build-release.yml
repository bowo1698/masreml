name: Build and release binary packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R-${{ matrix.config.r }} - ${{ matrix.config.rust-target }})

    strategy:
      fail-fast: false
      matrix:
        config:
          # Windows
          - {os: windows-latest, r: 'release', rust-target: 'x86_64-pc-windows-gnu',    ext: 'zip',    arch: 'x64'}

          # macOS — Intel runner builds x86_64, Apple Silicon runner builds aarch64
          - {os: macos-13,       r: 'release', rust-target: 'x86_64-apple-darwin',      ext: 'tar.gz', arch: 'x64'}
          - {os: macos-14,       r: 'release', rust-target: 'aarch64-apple-darwin',     ext: 'tar.gz', arch: 'arm64'}

          # Linux
          - {os: ubuntu-latest,  r: 'release', rust-target: 'x86_64-unknown-linux-gnu', ext: 'tar.gz', arch: 'x64'}

    steps:
      - uses: actions/checkout@v4

      - name: Fix Git line endings (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          git config --global core.autocrlf false
          git checkout .

      - name: Setup R (macOS / Linux)
        if: runner.os != 'Windows'
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Setup R (Windows, with Rtools43)
        if: runner.os == 'Windows'
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          rtools-version: '43'
          use-public-rspm: true
          windows-path-include-rtools: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.config.rust-target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libopenblas-dev gfortran pkg-config

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openblas
          echo "PKG_CONFIG_PATH=$(brew --prefix openblas)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L$(brew --prefix openblas)/lib" >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I$(brew --prefix openblas)/include" >> "$GITHUB_ENV"

      - name: Install R dependencies
        shell: Rscript {0}
        run: |
          install.packages("remotes")
          remotes::install_deps(dependencies = TRUE)

      - name: Setup rextendr
        shell: Rscript {0}
        run: |
          install.packages("rextendr")
          rextendr::rust_sitrep()

      - name: Clean Rust target (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          rm -rf src/rust/target
          rm -f src/rust/Cargo.lock

      - name: Build binary package
        shell: bash
        run: |
          mkdir -p tmp_lib
          R CMD INSTALL . --library=tmp_lib || exit 1

          # Strip source / build artefacts from the binary
          rm -rf tmp_lib/masreml/src/
          rm -f tmp_lib/masreml/Makevars*

          EXT="${{ matrix.config.ext }}"
          if [ "${{ runner.os }}" == "Windows" ]; then
            (cd tmp_lib && zip -r "../masreml_binary.${EXT}" masreml/)
          else
            (cd tmp_lib && tar -czf "../masreml_binary.${EXT}" masreml/)
          fi
          ls -lh "masreml_binary.${EXT}"

      - name: Smoke test installed binary
        shell: Rscript {0}
        run: |
          .libPaths(c(normalizePath("tmp_lib"), .libPaths()))
          library(masreml)
          d <- masreml::load_data()
          y_train <- setNames(d$pheno$y_cont_qtl_snp, d$pheno$id)[d$train_idx]
          fit <- masreml::masreml(
            y       = y_train,
            markers = list(snp_add = d$snp[d$train_idx, ]),
            method  = "AI",
            verbose = FALSE
          )
          stopifnot(
            isTRUE(fit$converged),
            is.finite(fit$varcomp$h2[["snp_add"]]),
            length(fit$gebv$snp_add) == length(y_train)
          )
          pred <- predict(fit)
          stopifnot(!is.null(pred$GEBV), length(pred$GEBV) == length(y_train))
          cat(sprintf("SMOKE OK on %s: n=%d h2=%.3f\n",
                      R.version$platform, fit$n,
                      fit$varcomp$h2[["snp_add"]]))
